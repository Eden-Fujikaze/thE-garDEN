name: Build Modpack Release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Refresh client pack
        working-directory: client
        run: packwiz refresh

      - name: Refresh server pack
        working-directory: server
        run: packwiz refresh

      - name: Deploy client pack to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./client
          keep_files: false

      - name: Deploy server pack to GitHub Pages (server branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./server
          publish_branch: server-pages
          keep_files: false
